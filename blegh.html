  <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Interacción</title>
</head>

<body style="margin:0; overflow:hidden; background:#222; font-family:Arial, sans-serif;">

<div style="width:100vw; height:100vh; margin:0; position:relative; overflow:hidden;">

  <!-- FONDO -->
  <div style="position:absolute; width:100%; height:100%;">
    <img src="assets/images/fondo vagon.jpeg" 
         style="width:100%; height:100%; object-fit:cover; image-rendering:pixelated;">
  </div>

  <!-- PERSONAJE -->
  <div style="position:absolute; width:100%; height:100%; pointer-events:none;">
    <div style="position:absolute; right:60px; bottom:120px; width:320px;">
      <img src="assets/images/historiador.png" 
           style="width:100%; image-rendering:pixelated;">
    </div>
  </div>

  <!-- DIÁLOGO -->
  <div style="position:absolute; bottom:0; width:100%; height:120px; background:#f4d06f; padding:15px; box-sizing:border-box; border-top:4px solid black;">
    <p id="text" style="margin:0 0 10px 0;"></p>
    <div id="choices" style="display:flex; gap:10px; justify-content:flex-end;"></div>
  </div>

</div>

<script>

const scenes = {
  start: {
    text: "Lorem ipsum dolor sit amet consectetur.",
    options: [
      { text: "Acción 1", next: "a1" },
      { text: "Acción 2", next: "a2" },
      { text: "Acción 3", next: "a3" }
    ]
  },

  a1: {
    text: "El historiador te observa con atención.",
    options: [{ text: "Continuar", next: "end" }]
  },

  a2: {
    text: "El historiador parece confundido.",
    options: [{ text: "Volver", next: "start" }]
  },

  a3: {
    text: "El historiador reacciona de forma inesperada.",
    options: [{ text: "Finalizar", next: "end" }]
  },

  end: {
    text: "Fin de la interacción.",
    options: [{ text: "Reiniciar", next: "start" }]
  }
};

let currentScene = "start";

function renderScene() {
  const scene = scenes[currentScene];

  document.getElementById("text").innerText = scene.text;

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  scene.options.forEach(option => {
    const btn = document.createElement("button");
    btn.innerText = option.text;

    btn.style.background = "#003366";
    btn.style.color = "white";
    btn.style.border = "none";
    btn.style.padding = "6px 12px";
    btn.style.cursor = "pointer";
    btn.style.borderRadius = "6px";

    btn.onmouseover = () => btn.style.background = "#0055aa";
    btn.onmouseout = () => btn.style.background = "#003366";

    btn.onclick = () => {
      currentScene = option.next;
      renderScene();
    };

    choicesDiv.appendChild(btn);
  });
}

renderScene();



</script>

</body>
</html>
